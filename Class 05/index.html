<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shoeContainer">
      <img
        src="https://e7.pngegg.com/pngimages/723/143/png-clipart-shoe-nike-free-air-force-nike-shoes-image-file-formats-fashion.png"
        alt=""
      />
    </div>
    <div class="card">
      <h4>Track Shoes</h4>
      <p>
        Track shoes are designed for running on a track. They have spikes on the
        bottom to provide traction and are lightweight to help you run faster.
      </p>
      <h5>Color</h5>
      <div class="colorVariations">
        <span style="background-color: green"></span>
        <span style="background-color: blue"></span>
        <span style="background-color: red"></span>
        <span style="background-color: orange"></span>
      </div>

      <h5>Size</h5>
      <div class="sizeVariations">
        <span>40</span>
        <span>41</span>
        <span>42</span>
        <span>43</span>
        <span>44</span>
      </div>
      <div class="cta">
        <button class="addToCart">Add to Cart</button>
        <span>$200</span>
      </div>
    </div>
    <br />
    <br />
    <br />
    <br />
    <br />
  </body>
</html>
